<style>
:root{--accent:#d97706;--accent-light:#fde68a;--cream:#f4f7fa;--text-dark:#2c3440;--text-mid:#566374;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh;}
.lang-bar{display:flex;justify-content:center;gap:6px;padding:10px 16px;flex-wrap:wrap;background:var(--cream);}
.lang-btn{border:2px solid var(--accent-light);background:rgba(255,255,255,0.92);border-radius:50px;padding:4px 9px;font-family:'Nunito',sans-serif;font-size:0.72rem;font-weight:800;color:var(--text-mid);cursor:pointer;transition:all 0.2s;}
.lang-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.top-bar{background:linear-gradient(135deg,var(--accent) 0%,#b45309 100%);padding:16px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(0,0,0,0.15);}
.back-btn{background:rgba(255,255,255,0.25);border:none;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.2rem;color:#fff;text-decoration:none;flex-shrink:0;transition:background 0.2s;}
.back-btn:hover{background:rgba(255,255,255,0.4);}
.top-title{font-family:'Pacifico',cursive;font-size:1.3rem;color:#fff;text-shadow:1px 2px 4px rgba(0,0,0,0.2);flex:1;}
.top-emoji{font-size:1.8rem;}
.content{padding:20px 16px 40px;max-width:640px;margin:0 auto;}
.back-footer{text-align:center;margin-top:28px;padding-bottom:20px;}
.back-footer a{display:inline-flex;align-items:center;gap:8px;color:var(--accent);font-weight:700;font-size:1rem;text-decoration:none;background:var(--accent-light);padding:12px 24px;border-radius:50px;transition:opacity 0.2s;}
.back-footer a:hover{opacity:0.8;}

  /* text info card */
  .info-card {
    background: #fff;
    border-radius: 14px;
    padding: 16px 18px;
    margin: 18px 0;
    box-shadow: 0 2px 12px rgba(120,80,60,0.08);
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--text-mid);
  }
  .info-card h3 {
    font-size: 0.95rem;
    font-weight: 900;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .info-card ul { padding-left: 1.2em; }
  .info-card li { margin-bottom: 4px; }
  .info-card .tel {
    font-size: 1.1rem;
    font-weight: 900;
    color: var(--text-dark);
    letter-spacing: 0.03em;
  }
</style>

<div class="info-card">
  <h3 data-i18n="cbTitle">How to reset the circuit breaker</h3>
  <p data-i18n="cbBody">The circuit breaker box is on the wall next to the sofa bed. If the power goes out, open the box and flip the tripped switch back up to reset it.</p>
