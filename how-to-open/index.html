<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How to Open — Region Otsuka 201</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
<style>
  :root{--accent:#d9467d;--accent-light:#f9a8d4;--cream:#fff7fa;--text-dark:#3f2431;--text-mid:#6f4a5a;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh;}
  .top-bar{background:linear-gradient(135deg,var(--accent) 0%,color-mix(in srgb,var(--accent) 70%,black) 100%);padding:16px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(0,0,0,0.15);}
  .back-btn{background:rgba(255,255,255,0.25);border:none;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.2rem;color:#fff;text-decoration:none;flex-shrink:0;transition:background 0.2s;}
  .back-btn:hover{background:rgba(255,255,255,0.4);}
  .top-title{font-family:'Pacifico',cursive;font-size:1.3rem;color:#fff;text-shadow:1px 2px 4px rgba(0,0,0,0.2);flex:1;}
  .top-emoji{font-size:1.8rem;}
  .content{padding:20px 16px 40px;max-width:640px;margin:0 auto;}
  .back-footer{text-align:center;margin-top:28px;padding-bottom:20px;}
  .back-footer a{display:inline-flex;align-items:center;gap:8px;color:var(--accent);font-weight:700;font-size:1rem;text-decoration:none;background:var(--accent-light);padding:12px 24px;border-radius:50px;transition:opacity 0.2s;}
  .back-footer a:hover{opacity:0.8;}
  .lang-bar{display:flex;justify-content:center;gap:6px;padding:10px 16px;flex-wrap:wrap;background:var(--cream);}
  .lang-btn{border:2px solid var(--accent-light);background:rgba(255,255,255,0.92);border-radius:50px;padding:4px 9px;font-family:'Nunito',sans-serif;font-size:0.72rem;font-weight:800;color:var(--text-mid);cursor:pointer;transition:all 0.2s;box-shadow:0 2px 8px rgba(120,50,80,0.12);}
  .lang-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .lang-btn:hover:not(.active){border-color:var(--accent);color:var(--accent);}
  .notice-card{background:#fff;border:3px solid var(--accent);border-radius:16px;padding:28px 24px;text-align:center;box-shadow:0 4px 20px rgba(217,70,125,0.15);margin-bottom:24px;}
  .notice-card .notice-icon{font-size:3.5rem;margin-bottom:16px;display:block;}
  .notice-card .notice-title{font-family:'Pacifico',cursive;font-size:1.2rem;color:var(--accent);margin-bottom:16px;}
  .notice-card .notice-body{font-size:0.95rem;line-height:1.8;color:var(--text-mid);}
  .notice-card .notice-body strong{color:var(--accent);display:block;margin-top:12px;font-size:1rem;}
</style>
</head>
<body>
<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('en',this)">🇬🇧 EN</button>
  <button class="lang-btn" onclick="setLang('ja',this)">🇯🇵 JA</button>
  <button class="lang-btn" onclick="setLang('zh',this)">🇨🇳 ZH</button>
  <button class="lang-btn" onclick="setLang('ko',this)">🇰🇷 KO</button>
  <button class="lang-btn" onclick="setLang('fr',this)">🇫🇷 FR</button>
  <button class="lang-btn" onclick="setLang('es',this)">🇪🇸 ES</button>
</div>
<div class="top-bar">
  <a href="../" class="back-btn">&#8592;</a>
  <span class="top-emoji">&#x1F511;</span>
  <div class="top-title" data-i18n="pageTitle">How to Open</div>
</div>
<div class="content">
  <div class="notice-card">
    <span class="notice-icon">&#x1F4CB;</span>
    <div class="notice-title" data-i18n="cardTitle">Check-in Information</div>
    <div class="notice-body">
      <span data-i18n="cardBody">The check-in instructions including door codes and key box information will be sent to you after we receive your guest registration form.</span>
      <strong data-i18n="cardSub">Please complete the registration form sent to you before your arrival &#x1F60A;</strong>
    </div>
  </div>
  <div class="back-footer">
    <a href="../" data-i18n="backToMenu">&#8592; Back to Menu</a>
  </div>
</div>
